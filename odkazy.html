    <script src="script.js"></script>
    
    <script>
        // Instagram data structure - ready for API integration
        const instagramData = {
            username: '@itsjacob.jpg',
            posts: 0,
            followers: 0,
            following: 0,
            profilePic: 'https://via.placeholder.com/150/333333/ffffff?text=IG',
            bio: '17yo, Film student in Prague'
        };

        // Mock data for immediate display
        function loadMockData() {
            instagramData.posts = 25;
            instagramData.followers = 375;
            instagramData.profilePic = 'mojeigprofilovka.jpg';
            
            updateInstagramDisplay();
        }

        // Update the display with current data
        function updateInstagramDisplay() {
            document.getElementById('ig-posts').textContent = formatNumber(instagramData.posts);
            document.getElementById('ig-followers').textContent = formatNumber(instagramData.followers);
            document.getElementById('ig-following').textContent = formatNumber(instagramData.following);
            document.getElementById('ig-profile-pic').src = instagramData.profilePic;
            
            // Update profile info
            document.querySelector('.profile-username').textContent = instagramData.username;
            document.querySelector('.profile-bio').textContent = instagramData.bio;
        }

        // Format numbers with K/M suffixes
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // Fetch real Instagram data from Node.js server
        async function fetchInstagramData() {
            try {
                const response = await fetch('/api/instagram');
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Update with real data
                    instagramData.posts = data.posts || instagramData.posts;
                    instagramData.followers = data.followers || instagramData.followers;
                    instagramData.profilePic = data.profile_pic || instagramData.profilePic;
                    
                    updateInstagramDisplay();
                    console.log('Updated with real Instagram data');
                } else {
                    throw new Error('Server API not available');
                }
            } catch (error) {
                console.log('Using mock data, server not available:', error);
                // Keep using mock data as fallback
            }
        }

        // Auto-refresh function (every 5 minutes)
        function startAutoRefresh() {
            setInterval(() => {
                fetchInstagramData();
            }, 5 * 60 * 1000); // 5 minutes
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadMockData();
            fetchInstagramData(); // Try to fetch real data
            startAutoRefresh();
            startFollowerGrowth();
        });

        // Automatic follower growth every 2 days
        function startFollowerGrowth() {
            const lastUpdateKey = 'lastFollowerUpdate';
            const currentFollowersKey = 'currentFollowers';
            
            // Load saved data
            let lastUpdate = localStorage.getItem(lastUpdateKey);
            let currentFollowers = parseInt(localStorage.getItem(currentFollowersKey)) || 375;
            
            if (!lastUpdate) {
                // First time setup
                localStorage.setItem(lastUpdateKey, Date.now().toString());
                localStorage.setItem(currentFollowersKey, currentFollowers.toString());
            } else {
                // Calculate how many 2-day periods have passed
                const now = Date.now();
                const timeDiff = now - parseInt(lastUpdate);
                const daysPassed = timeDiff / (1000 * 60 * 60 * 24);
                const periodsPassed = Math.floor(daysPassed / 2);
                
                if (periodsPassed > 0) {
                    // Add followers for each passed period
                    currentFollowers += periodsPassed;
                    localStorage.setItem(currentFollowersKey, currentFollowers.toString());
                    localStorage.setItem(lastUpdateKey, now.toString());
                    
                    // Update display immediately
                    instagramData.followers = currentFollowers;
                    updateInstagramDisplay();
                }
            }
            
            // Check every hour for new followers
            setInterval(() => {
                const now = Date.now();
                const lastUpdate = parseInt(localStorage.getItem(lastUpdateKey));
                const currentFollowers = parseInt(localStorage.getItem(currentFollowersKey)) || 375;
                
                const daysPassed = (now - lastUpdate) / (1000 * 60 * 60 * 24);
                const periodsPassed = Math.floor(daysPassed / 2);
                
                if (periodsPassed > 0) {
                    const newFollowers = currentFollowers + periodsPassed;
                    localStorage.setItem(currentFollowersKey, newFollowers.toString());
                    localStorage.setItem(lastUpdateKey, now.toString());
                    
                    instagramData.followers = newFollowers;
                    updateInstagramDisplay();
                }
            }, 60 * 60 * 1000); // Check every hour
        }
    </script>
</body>
