<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architektura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;600;700&family=Inter:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @media (max-width: 640px) {
            .page-header .content-panel {
                padding-left: 16px;
                padding-right: 16px;
            }

            .page-header .architektura-title {
                font-size: clamp(2rem, 8.6vw, 2.55rem) !important;
                line-height: 0.94 !important;
                white-space: nowrap !important;
                letter-spacing: 0 !important;
                overflow-wrap: normal !important;
                word-break: normal !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <button type="button" class="logo-avatar-button" aria-label="Zvětšit profilovou fotku" data-preview-shape="circle">
                <img src="profilovka1.jpg" alt="Profilová fotka itsjacob" class="logo-avatar">
            </button>
            <a href="index.html" class="logo-name">itsjacob</a>
            <a href="https://www.instagram.com/itsjacob.jpg/" target="_blank" rel="noreferrer" aria-label="Instagram itsjacob" class="logo-ig-link">
                <img src="iglogo.png" alt="Instagram logo" class="logo-ig-icon">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Domů</a></li>
            <li><a href="galerie.html">Galerie</a></li>
            <li><a href="odkazy.html">Odkazy</a></li>
            <li><a href="bio.html">O mně</a></li>
        </ul>
        <button type="button" class="hamburger" aria-label="Otevřít menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="nav-mobile-overlay" aria-hidden="true">
        <nav class="nav-mobile-menu">
            <ul>
                <li><a href="index.html">Domů</a></li>
                <li><a href="galerie.html">Galerie</a></li>
                <li><a href="odkazy.html">Odkazy</a></li>
                <li><a href="bio.html">O mně</a></li>
            </ul>
        </nav>
    </div>

    <section class="page-header">
        <div class="content-panel">
            <p class="eyebrow">Typ fotografie</p>
            <h1 class="architektura-title">Architektura</h1>
            <p>Zaměřuju se na linie, světlo a strukturu prostoru.</p>
            <p>Hledám detaily a úhly, které dávají architektuře jiný pohled.</p>
        </div>
    </section>

    <section class="category-gallery-section">
        <div class="category-gallery">
            <div class="category-gallery-top">
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii architektury 1">
                    <img src="arch2.jpg" alt="Fotografie architektury 2" class="category-gallery-image" data-preview-shape="portrait">
                </button>
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii architektury 2">
                    <img src="arch3.jpg" alt="Fotografie architektury 3" class="category-gallery-image" data-preview-shape="portrait">
                </button>
            </div>
            <button type="button" class="category-gallery-item category-gallery-item-landscape" aria-label="Zvětšit fotografii architektury 3">
                <img src="arch1.jpg" alt="Fotografie architektury 1" class="category-gallery-image" data-preview-shape="landscape">
            </button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 - Architektura</p>
    </footer>

    <div class="profile-preview" aria-hidden="true">
        <button type="button" class="profile-preview-backdrop" aria-label="Zavřít náhled profilové fotky"></button>
        <div class="profile-preview-dialog" role="dialog" aria-modal="true" aria-label="Náhled profilové fotky">
            <img src="profilovka1.jpg" alt="Zvětšená profilová fotka itsjacob" class="profile-preview-image">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
