<body>
    <nav class="navbar">

            <a href="index.html" class="logo-name">itsjacob</a>

                <img src="iglogo.png" alt="Instagram logo" class="logo-ig-icon">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Domů</a></li>
            <li><a href="galerie.html">Galerie</a></li>
            <li><a href="odkazy.html">Odkazy</a></li>
            <li><a href="bio.html">O mně</a></li>

            <span></span>

    <div class="nav-mobile-overlay" aria-hidden="true">

    <section class="page-header">
        <div class="content-panel">
            <p class="eyebrow">Typ fotografie</p>
            <h1>Auta</h1>
            <p>Fotím auta s důrazem na detail, tvar a světlo.</p>
            <p>Každý záběr se snažím přizpůsobit charakteru konkrétního vozu.</p>
        </div>
    </section>

    <section class="category-gallery-section">
        <div class="category-gallery">
            <div class="category-gallery-top">
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii auta 1">
                    <img src="auto1.jpg" alt="Fotografie auta 1" class="category-gallery-image" data-preview-shape="portrait">
                </button>
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii auta 5">

                </button>
            </div>
            <div class="category-gallery-top">
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii auta 3">

                </button>
                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii auta 4">

                <button type="button" class="category-gallery-item category-gallery-item-portrait" aria-label="Zvětšit fotografii auta 2">

    <footer>
        <p>&copy; 2026 - Auta</p>
    </footer>

    <div class="profile-preview" aria-hidden="true">
        <button type="button" class="profile-preview-backdrop" aria-label="Zavřít náhled profilové fotky"></button>
        <div class="profile-preview-dialog" role="dialog" aria-modal="true" aria-label="Náhled profilové fotky">
            <img src="profilovka1.jpg" alt="Zvětšená profilová fotka itsjacob" class="profile-preview-image">
